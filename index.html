<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REAL-TIME SYSTEM MONITOR V2</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --neon-green: #00ff41; --dark-bg: #0d1117; --glass: rgba(13, 17, 23, 0.85); }
        
        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Consolas', 'Monaco', monospace;
            background-image: radial-gradient(#162a1b 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Hiệu ứng CRT Monitor */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 999;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .cyber-panel {
            background: var(--glass);
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 5px var(--neon-green);
            padding: 15px;
            margin-bottom: 20px;
            position: relative;
        }

        .cyber-panel::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: var(--neon-green);
            animation: scan 2s linear infinite;
        }

        @keyframes scan { 0% {top: 0; opacity: 1;} 100% {top: 100%; opacity: 0;} }

        .stat-value { font-size: 1.5rem; font-weight: bold; text-shadow: 0 0 10px var(--neon-green); }
        
        /* Terminal Styles */
        #terminal-output {
            height: 200px;
            overflow-y: auto;
            border-bottom: 1px dashed #555;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #ccc;
        }
        .cmd-input {
            background: transparent; border: none; color: var(--neon-green); width: 90%; outline: none;
        }
        .system-log { color: #f1c40f; }
        .error-log { color: #e74c3c; }
        .success-log { color: #2ecc71; }

    </style>
</head>
<body>

    <nav class="navbar navbar-dark border-bottom border-success p-3">
        <div class="container-fluid d-flex justify-content-between">
            <span class="h4 m-0"><i class="fa-solid fa-satellite-dish"></i> SAT_LINK_V2.0</span>
            <span id="live-clock" class="badge border border-success text-success">Connecting...</span>
        </div>
    </nav>

    <div class="container mt-4">
        
        <div class="row">
            <div class="col-md-4">
                <div class="cyber-panel">
                    <h6><i class="fa-solid fa-network-wired"></i> KẾT NỐI MẠNG (IP API)</h6>
                    <div id="ip-info" class="mt-3">
                        Đang dò tìm địa chỉ IP...
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="cyber-panel">
                    <h6><i class="fa-solid fa-battery-full"></i> TRẠNG THÁI THIẾT BỊ</h6>
                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <span>Pin (Battery):</span>
                        <span id="battery-level" class="stat-value">--%</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <span>Trạng thái:</span>
                        <span id="battery-status">Đang dò...</span>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="cyber-panel">
                    <h6><i class="fa-brands fa-bitcoin"></i> GIÁ BITCOIN (Live API)</h6>
                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <span class="display-6" id="btc-price">$0.00</span>
                        <i class="fa-solid fa-arrow-trend-up text-success fs-1"></i>
                    </div>
                    <small class="text-muted">Cập nhật: <span id="last-update">--</span></small>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <div class="cyber-panel">
                    <h6><i class="fa-solid fa-chart-area"></i> BIỂU ĐỒ GIÁ BTC (Cập nhật mỗi 5s)</h6>
                    <canvas id="realtimeChart" height="120"></canvas>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="cyber-panel" style="height: 100%;">
                    <h6><i class="fa-solid fa-terminal"></i> TERMINAL (Gõ 'help')</h6>
                    <div id="terminal-output">
                        <div>> System initialized...</div>
                        <div>> Waiting for user input...</div>
                    </div>
                    <div class="d-flex">
                        <span class="me-2">></span>
                        <input type="text" id="cmd-input" class="cmd-input" placeholder="Nhập lệnh..." autocomplete="off">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>

    <script>
        // 1. ĐỒNG HỒ THỰC TẾ
        setInterval(() => {
            document.getElementById('live-clock').innerText = moment().format('YYYY-MM-DD HH:mm:ss');
        }, 1000);

        // 2. LẤY THÔNG TIN IP THỰC (Sử dụng ipapi.co)
        fetch('https://ipapi.co/json/')
            .then(response => response.json())
            .then(data => {
                const infoHtml = `
                    <ul class="list-unstyled">
                        <li><strong>IP:</strong> ${data.ip}</li>
                        <li><strong>Thành phố:</strong> ${data.city}</li>
                        <li><strong>Quốc gia:</strong> ${data.country_name}</li>
                        <li><strong>Nhà mạng:</strong> ${data.org}</li>
                    </ul>`;
                document.getElementById('ip-info').innerHTML = infoHtml;
                logToTerminal(`Kết nối thành công tới ${data.ip}`, 'success-log');
            })
            .catch(err => {
                document.getElementById('ip-info').innerText = "Không thể lấy IP (Chặn quảng cáo?)";
                logToTerminal("Lỗi kết nối IP Server", 'error-log');
            });

        // 3. API PHẦN CỨNG (PIN)
        if ('getBattery' in navigator) {
            navigator.getBattery().then(function(battery) {
                function updateBattery() {
                    const level = Math.round(battery.level * 100);
                    document.getElementById('battery-level').innerText = level + "%";
                    document.getElementById('battery-status').innerText = battery.charging ? "Đang sạc ⚡" : "Dùng pin 🔋";
                    
                    // Đổi màu nếu pin yếu
                    const el = document.getElementById('battery-level');
                    el.style.color = level < 20 ? '#ff0055' : '#00ff41';
                }
                updateBattery();
                battery.addEventListener('levelchange', updateBattery);
                battery.addEventListener('chargingchange', updateBattery);
                logToTerminal("Đã đồng bộ nguồn điện thiết bị", 'success-log');
            });
        } else {
            document.getElementById('battery-status').innerText = "Không hỗ trợ trên thiết bị này";
        }

        // 4. CHART.JS & CRYPTO API (CoinGecko)
        const ctx = document.getElementById('realtimeChart').getContext('2d');
        const initialData = Array(10).fill(0); // Dữ liệu giả ban đầu
        const labels = Array(10).fill('');

        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'BTC/USD',
                    data: initialData,
                    borderColor: '#00ff41',
                    backgroundColor: 'rgba(0, 255, 65, 0.1)',
                    borderWidth: 1,
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                animation: false, // Tắt animation để update mượt hơn
                scales: {
                    x: { display: false },
                    y: { grid: { color: '#333' } }
                },
                plugins: { legend: { display: false } }
            }
        });

        // Hàm fetch giá Bitcoin
        async function fetchBitcoinPrice() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
                const data = await response.json();
                const price = data.bitcoin.usd;

                // Update UI số
                document.getElementById('btc-price').innerText = `$${price.toLocaleString()}`;
                document.getElementById('last-update').innerText = moment().format('HH:mm:ss');

                // Update Chart
                addDataToChart(chart, moment().format('mm:ss'), price);
            } catch (error) {
                console.log("API Limit reached or Error");
            }
        }

        function addDataToChart(chart, label, data) {
            chart.data.labels.push(label);
            chart.data.datasets.forEach((dataset) => {
                dataset.data.push(data);
            });

            // Giữ lại 15 điểm dữ liệu gần nhất
            if (chart.data.labels.length > 15) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
            }
            chart.update();
        }

        // Gọi lần đầu và lặp lại mỗi 10 giây (tránh bị block API free)
        fetchBitcoinPrice();
        setInterval(fetchBitcoinPrice, 10000); 

        // 5. CHỨC NĂNG TERMINAL (Console giả lập)
        const input = document.getElementById('cmd-input');
        const output = document.getElementById('terminal-output');

        input.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                const cmd = input.value.toLowerCase().trim();
                input.value = ""; // Xóa input
                processCommand(cmd);
            }
        });

        function logToTerminal(text, className = '') {
            const div = document.createElement('div');
            div.className = className;
            div.innerHTML = `> ${text}`;
            output.appendChild(div);
            output.scrollTop = output.scrollHeight; // Auto scroll xuống dưới
        }

        function processCommand(cmd) {
            logToTerminal(cmd, 'text-white'); // In lại lệnh vừa gõ

            switch(cmd) {
                case 'help':
                    logToTerminal("Danh sách lệnh: <br> - help: Xem trợ giúp <br> - clear: Xóa màn hình <br> - scan: Quét hệ thống <br> - date: Xem ngày giờ <br> - matrix: Kích hoạt Matrix", 'system-log');
                    break;
                case 'clear':
                    output.innerHTML = "";
                    break;
                case 'date':
                    logToTerminal(moment().format('LLLL'), 'success-log');
                    break;
                case 'scan':
                    logToTerminal("Đang quét virus...", 'system-log');
                    setTimeout(() => logToTerminal("Quét 20%...", 'system-log'), 500);
                    setTimeout(() => logToTerminal("Quét 80%...", 'system-log'), 1200);
                    setTimeout(() => logToTerminal("Hệ thống an toàn!", 'success-log'), 2000);
                    break;
                case 'matrix':
                    logToTerminal("Wake up, Neo...", 'success-log');
                    document.body.style.fontFamily = "'Courier New', monospace";
                    break;
                case '':
                    break;
                default:
                    logToTerminal(`Lệnh '${cmd}' không tồn tại. Gõ 'help'.`, 'error-log');
            }
        }
    </script>
</body>
</html>
